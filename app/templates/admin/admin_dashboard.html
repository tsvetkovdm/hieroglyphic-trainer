{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Админ-панель</h2>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Имя пользователя</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
                <td>{{ user[3] }}</td>
                <td>
                    <a href="{{ url_for('admin_edit_user', user_id=user[0]) }}" class="btn btn-sm btn-warning">Редактировать</a>
                    <form method="POST" action="{{ url_for('admin_delete_user', user_id=user[0]) }}" onsubmit="return confirm('Удалить пользователя?');" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm">Удалить</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
