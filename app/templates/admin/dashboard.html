{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Админ-панель</h2>
        <a href="{{ url_for('admin.add_user') }}" class="btn btn-success">
            <i class="bi bi-person-plus">Создать пользователя</i> 
        </a>
    </div>

    <div class="card shadow rounded-2">
        <div class="card-body p-2">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Имя пользователя</th>
                        <th scope="col">Email</th>
                        <th scope="col">Роль</th>
                        <th scope="col" class="text-end">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user[0] }}</td>
                        <td>{{ user[1] }}</td>
                        <td>{{ user[2] }}</td>
                        <td>{{ user[3] }}</td>
                        <td class="text-end">
                            <div class="d-flex justify-content-end gap-2">
                                <a href="{{ url_for('admin.edit_user', user_id=user[0]) }}" class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil-square"> Редактировать </i>
                                </a>
                                <form method="POST" action="{{ url_for('admin.delete_user', user_id=user[0]) }}" onsubmit="return confirm('Удалить пользователя?');">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash"> Удалить </i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
