{% extends "base.html" %}
{% from 'bootstrap5/form.html' import render_field %}

{% block content %}
    <h2>{{title}}</h2>
    <form method="POST" action="">
        {{form.hidden_tag()}}
        {{ render_field(form.username, class="form-control from-control-lg") }}
        {{ render_field(form.password) }}
        {{form.submit}}
    </form>
{% endblock %}
